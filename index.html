<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="蜗牛地图">
    <meta name="theme-color" content="#5A7D66">
    <title>【螃蟹是也的蜗牛地图】</title>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="china-map.js"></script>
    <script>
        window._AMapSecurityConfig = {
            securityJsCode: 'a4d0b6007908ab8cfb6d9515a24a373b'
        };
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=91064171af4a2207dbdb6dfd9d38f8c5&plugin=AMap.Geocoder,AMap.AutoComplete,AMap.PlaceSearch"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 莫兰迪绿色系（冷调不偏黄） */
            --moss-50: #F5F7F5;
            --moss-100: #E8F0E9;
            --moss-200: #D1DDD4;
            --moss-300: #A7BDAE;
            --moss-400: #7D9E88;
            --moss-500: #5A7D66;
            --moss-600: #4A6755;
            --moss-700: #3D5A45;
            --moss-800: #2F4836;
            --moss-900: #233829;
            /* 极简灰阶 */
            --white: #FFFFFF;
            --off-white: #FAFBFA;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F4;
            --gray-200: #E5E7E7;
            --gray-300: #D1D5D5;
            --gray-400: #9CA4A0;
            --gray-500: #6B7470;
            --gray-600: #4B5552;
            --gray-700: #37413F;
            --gray-750: #2B3533;
            --gray-800: #1F2927;
            --red-500: #D4636F;
            --red-600: #C14B57;
            /* 极简圆角 */
            --radius-sm: 4px;
            --radius: 6px;
            --radius-lg: 8px;
            /* 极淡阴影 */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.08);
            --tab-height: 60px;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
            background: var(--off-white);
            color: var(--gray-700);
            -webkit-tap-highlight-color: transparent;
        }

        .app-header {
            background: var(--moss-700);
            color: var(--white);
            padding: 16px 20px 12px 20px;
            padding-top: calc(16px + env(safe-area-inset-top));
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--moss-800);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .app-header h1 {
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            margin: 0;
            color: var(--white);
        }

        .app-header .subtitle {
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            margin: 0;
            letter-spacing: 0.02em;
        }

        .page {
            display: none;
            padding: 12px 16px calc(var(--tab-height) + 16px + env(safe-area-inset-bottom)) 16px;
            max-width: 600px;
            margin: 0 auto;
            min-height: calc(100vh - 60px - var(--tab-height) - env(safe-area-inset-bottom));
        }

        .page.active {
            display: block;
            animation: pageEnter 0.25s ease-out;
        }

        @keyframes pageEnter {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(var(--tab-height) + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
            background: #FFFFFF;
            display: flex;
            border-top: 1px solid #D1D5D5;
            z-index: 1000;
            width: 100%;
            box-sizing: border-box;
        }

        .tab-item {
            width: calc(100% / 4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: none;
            background: none;
            cursor: pointer;
            color: #9CA4A0;
            font-size: 12px;
            line-height: 1.2;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-weight: 400;
            padding: 0;
            margin: 0;
        }

        .tab-item.active {
            color: var(--moss-600);
        }

        .tab-item svg {
            width: 22px;
            height: 22px;
            display: block;
            flex-shrink: 0;
        }

        /* Form */
        .form-group {
            margin-bottom: 14px;
        }
        .form-group-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }
        
        .form-group-half {
            flex: 1;
            margin-bottom: 0;
        }

        .form-group label,
        .form-group-half label {
            display: block;
            font-size: 0.8rem !important;
            font-weight: 400 !important;
            color: var(--gray-600) !important;
            margin-bottom: 6px;
        }

        .form-group label .required {
            color: var(--red-500);
            margin-left: 2px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            background: var(--white);
            color: var(--gray-700);
            font-weight: 300;
        }

        .form-input:focus {
            border-color: var(--moss-400);
        }

        .form-input::placeholder {
            color: var(--gray-400);
            font-weight: 300;
        }

        /* Image Upload */
        .image-upload-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .image-preview-item {
            width: 75px;
            height: 75px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            position: relative;
            border: 1px solid var(--gray-200);
            flex-shrink: 0;
            cursor: grab;
        }
        
        .image-preview-item:active {
            cursor: grabbing;
        }
        
        .image-preview-item.dragging {
            opacity: 0.5;
            border-color: var(--moss-400);
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-upload-trigger {
            width: 75px;
            height: 75px;
            border: 1px dashed var(--gray-300);
            border-radius: var(--radius-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--gray-400);
            transition: border-color 0.2s, color 0.2s;
            flex-shrink: 0;
            background: var(--white);
        }

        .image-upload-trigger:active {
            border-color: var(--moss-400);
            color: var(--moss-600);
        }

        @media (hover: hover) {
            .image-upload-trigger:hover {
                border-color: var(--moss-400);
                color: var(--moss-600);
            }
        }

        .image-upload-trigger svg {
            width: 20px;
            height: 20px;
            margin-bottom: 2px;
        }

        .image-upload-trigger span {
            font-size: 0.65rem;
        }

        .image-upload-hint {
            font-size: 0.75rem;
            color: var(--gray-400);
            margin-top: 6px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px 24px;
            min-height: 44px;
            border: none;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 400;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            width: 100%;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: var(--moss-600);
            color: var(--white);
        }

        .btn-primary:active {
            background: var(--moss-800);
        }

        @media (hover: hover) {
            .btn-primary:hover {
                background: var(--moss-700);
            }
        }

        .btn-danger {
            background: var(--white);
            color: var(--red-500);
            border: 1px solid var(--red-500);
        }

        .btn-danger:active {
            background: var(--red-600);
            color: var(--white);
        }

        @media (hover: hover) {
            .btn-danger:hover {
                background: var(--red-500);
                color: var(--white);
            }
        }

        .btn-back {
            background: var(--white);
            color: var(--gray-600);
            border: 1px solid var(--gray-200);
            width: auto;
            padding: 8px 16px;
        }

        .map-search-bar {
            position: absolute;
            top: 60px; /* 避开app-header的高度 */
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--white);
            padding: 10px 16px;
            border-bottom: 1px solid var(--gray-100);
        }

        .search-input {
            width: 100%;
            padding: 10px 40px 10px 14px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            background: var(--off-white);
            font-weight: 300;
            min-height: 44px;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: var(--moss-400);
            background: var(--white);
        }

        .map-search-bar .search-input {
            background: var(--white);
            border-color: var(--gray-200);
        }

        .map-search-bar .search-input:focus {
            border-color: var(--moss-400);
        }

        .search-clear-btn {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border: none;
            background: var(--gray-200);
            color: var(--gray-600);
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .search-clear-btn:active {
            background: var(--gray-400);
        }

        @media (hover: hover) {
            .search-clear-btn:hover {
                background: var(--gray-300);
            }
        }

        .map-search-bar .search-clear-btn {
            background: rgba(0,0,0,0.15);
            color: var(--white);
            right: 28px;
        }

        .map-search-bar .search-clear-btn:active {
            background: rgba(0,0,0,0.35);
        }

        @media (hover: hover) {
            .map-search-bar .search-clear-btn:hover {
                background: rgba(0,0,0,0.25);
            }
        }

        #list-page .search-clear-btn {
            right: 28px;
        }

        /* Cards */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--gray-100);
            cursor: pointer;
            transition: border-color 0.2s;
            display: flex;
            gap: 12px;
            padding: 10px;
        }

        .card:active {
            border-color: var(--moss-400);
        }

        @media (hover: hover) {
            .card:hover {
                border-color: var(--moss-300);
            }
        }

        .card-thumb {
            width: 68px;
            height: 68px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            flex-shrink: 0;
            background: var(--gray-50);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-300);
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-thumb-placeholder svg {
            width: 24px;
            height: 24px;
            color: var(--gray-300);
        }

        .card-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 3px;
        }

        .card-chinese-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--gray-800);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: inherit;
        }

        .card-latin-name {
            font-size: 0.8rem;
            font-weight: 300;
            color: var(--gray-500);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: inherit;
            font-style: italic;
        }

        .card-meta {
            font-size: 0.75rem;
            color: var(--gray-400);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-arrow {
            display: flex;
            align-items: center;
            color: var(--gray-300);
            flex-shrink: 0;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-400);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* Detail Page */
        .detail-section {
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--gray-100);
        }

        .detail-section:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--gray-600);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .detail-value {
            font-size: 0.95rem;
            color: var(--gray-700);
            font-weight: 300;
            line-height: 1.5;
        }

        .detail-value.large {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--moss-800);
        }

        .detail-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        .detail-image {
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--gray-50);
            cursor: pointer;
            transition: opacity 0.2s;
            border: 1px solid var(--gray-100);
        }

        .detail-image:active {
            opacity: 0.8;
        }

        .detail-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-actions {
            display: flex;
            gap: 10px;
            padding-top: 8px;
        }

        /* Image Viewer Overlay */
        .image-viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .image-viewer.active {
            display: flex;
        }

        .image-viewer img {
            max-width: 95vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 4px;
        }

        .image-viewer .close-viewer {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gray-800);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 300;
            animation: toastIn 0.3s ease-out;
            pointer-events: none;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Location Picker */
        .location-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .location-row .form-input {
            flex: 1;
            min-width: 0;
        }

        .btn-map-picker {
            width: 48px;
            min-width: 48px;
            min-height: 42px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            background: var(--white);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .btn-map-picker:active {
            border-color: var(--moss-500);
            background: var(--moss-100);
        }

        @media (hover: hover) {
            .btn-map-picker:hover {
                border-color: var(--moss-400);
                background: var(--moss-50);
            }
        }

        /* Map Modal */
        .map-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 250;
            background: var(--white);
            flex-direction: column;
        }

        .map-modal.active {
            display: flex;
        }

        .map-modal-header {
            display: flex;
            flex-direction: column;
            padding: 10px 16px;
            background: var(--white);
            color: var(--gray-800);
            flex-shrink: 0;
            gap: 8px;
            border-bottom: 1px solid var(--gray-100);
        }

        .map-modal-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--moss-700);
        }

        .map-search-row {
            position: relative;
        }

        .map-search-input {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
            color: var(--gray-800);
        }

        .map-search-input::placeholder {
            color: var(--gray-400);
        }

        .map-search-results {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            color: var(--gray-800);
        }

        .map-search-results.active {
            display: block;
        }

        .map-search-result-item {
            padding: 10px 14px;
            font-size: 0.85rem;
            color: var(--gray-700);
            cursor: pointer;
            border-bottom: 1px solid var(--gray-100);
        }

        .map-search-result-item:last-child {
            border-bottom: none;
        }

        .map-search-result-item:active {
            background: var(--moss-100);
        }

        .map-search-result-item.active {
            background: var(--moss-50);
        }

        @media (hover: hover) {
            .map-search-result-item:hover {
                background: var(--moss-50);
            }
        }

        .map-search-result-item .result-name {
            font-weight: 500;
            color: var(--gray-800);
        }

        .map-search-result-item .result-addr {
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-top: 2px;
            font-weight: 300;
        }

        .map-modal-close {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-sm);
            background: var(--gray-100);
            color: var(--gray-700);
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .map-container {
            flex: 1;
            min-height: 0;
            width: 100%;
            height: calc(100vh - 118px);
            background: #333;
        }

        .map-hint {
            text-align: center;
            font-size: 0.75rem;
            color: var(--gray-500);
            padding: 8px 16px;
            flex-shrink: 0;
            background: var(--gray-50);
            font-weight: 300;
        }

        #map-page {
            padding: 0 !important;
            margin: 0 !important;
            max-width: none !important;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: calc(var(--tab-height) + env(safe-area-inset-bottom));
            z-index: 1;
            background: #1a1a1a;
            width: 100vw;
            height: calc(100vh - var(--tab-height) - env(safe-area-inset-bottom));
        }

        .map-page-search {
            position: absolute;
            top: calc(80px + env(safe-area-inset-top));
            left: 0;
            right: 0;
            z-index: 100;
            background: #F0F2F1;
            padding: 10px 16px;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
        }

        .search-box {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--white);
            width: min(100%, 600px);
            margin: -12px auto 6px auto;
            border-bottom: 1px solid var(--gray-100);
        }
        
        .search-box-inner {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .data-toolbar {
            display: flex;
            gap: 8px;
            width: min(100%, 600px);
            margin: 0 auto 10px auto;
            padding: 0 12px;
        }

        .data-toolbar .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: var(--gray-600);
            background: var(--white);
            border: 1px solid var(--gray-200);
        }

        .data-toolbar .btn:active {
            background: var(--gray-100);
        }

        @media (hover: hover) {
            .data-toolbar .btn:hover {
                background: var(--gray-50);
            }
        }

        /* Filter Dropdown */
        .filter-dropdown-wrapper {
            position: relative;
        }

        .filter-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            width: 260px;
            background: var(--white);
            border: 1px solid var(--gray-100);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            z-index: 300;
            margin-top: 6px;
            max-height: 300px;
            overflow: hidden;
            flex-direction: column;
        }

        .filter-dropdown.active {
            display: flex;
        }

        .filter-dropdown-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid var(--gray-100);
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--moss-700);
        }

        .filter-dropdown-close {
            width: 24px;
            height: 24px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--gray-500);
        }

        .filter-dropdown-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .filter-dropdown-footer {
            padding: 8px 12px;
            border-top: 1px solid var(--gray-100);
            display: flex;
            gap: 8px;
        }

        .filter-dropdown-footer .btn {
            flex: 1;
            padding: 7px 12px;
            font-size: 0.85rem;
            min-height: 36px;
        }

        .filter-family {
            margin-bottom: 4px;
        }

        .filter-family-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--gray-700);
        }

        .filter-family-toggle {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            font-size: 0.8rem;
            color: var(--gray-400);
        }

        .filter-family-toggle.expanded {
            transform: rotate(90deg);
        }

        .filter-genus-list {
            margin-left: 26px;
            display: none;
        }

        .filter-genus-list.expanded {
            display: block;
        }

        .filter-genus-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0;
            font-size: 0.8rem;
        }

        .map-search-input {
            width: 100%;
            padding: 10px 40px 10px 12px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 1rem;
            outline: none;
            background: white;
            transition: border-color 0.2s;
            font-weight: 300;
        }

        .map-search-input:focus {
            border-color: var(--moss-400);
        }

        .map-search-clear {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border: none;
            background: var(--gray-100);
            color: var(--gray-500);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-page-map {
            width: 100%;
            height: 100%;
        }

        #record-map {
            border-radius: 0;
            width: 100%;
            height: 100%;
            padding-top: 136px;
            padding-bottom: 120px;
            box-sizing: border-box;
        }

        .amap-info-content {
            padding: 0 !important;
        }

        .amap-info {
            border-radius: 12px !important;
            overflow: visible !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .amap-info-close {
            display: none !important;
        }

        .amap-info-sharp {
            z-index: 1;
        }

        .map-info-window {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90px;
            cursor: pointer;
        }

        .map-info-thumb-wrap {
            width: 90px;
            height: 120px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0;
            overflow: hidden;
        }

        .map-info-thumb {
            width: 90px;
            height: 120px;
            object-fit: cover;
            border-radius: 0;
        }

        .map-info-placeholder {
            font-size: 32px;
            color: var(--gray-400);
        }

        .map-info-loading {
            width: 90px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gray-100);
            border-radius: 0;
            font-size: 24px;
        }

        .map-info-name {
            font-size: 10px;
            font-weight: 600;
            color: var(--gray-800);
            text-align: center;
            padding: 6px 10px;
            width: 90px;
            box-sizing: border-box;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: #fff;
            border-radius: 0 0 8px 8px;
        }

        /* Confirm Dialog */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 280;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .confirm-overlay.active {
            display: flex;
        }

        .confirm-dialog {
            background: var(--white);
            border-radius: var(--radius);
            padding: 24px 20px 18px 20px;
            max-width: 320px;
            width: calc(100vw - 48px);
            box-shadow: var(--shadow-lg);
            text-align: center;
            border: 1px solid var(--gray-100);
        }

        .confirm-dialog p {
            font-size: 0.9rem;
            color: var(--gray-700);
            margin-bottom: 18px;
            line-height: 1.5;
            font-weight: 300;
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
        }

        .confirm-actions .btn {
            flex: 1;
            padding: 9px 18px;
            min-height: 44px;
        }

        .btn-confirm-no {
            background: var(--gray-100);
            color: var(--gray-700);
        }

        .btn-confirm-no:active {
            background: var(--gray-300);
        }

        @media (hover: hover) {
            .btn-confirm-no:hover {
                background: var(--gray-200);
            }
        }

        .btn-confirm-yes {
            background: var(--moss-600);
            color: var(--white);
        }

        .btn-confirm-yes:active {
            background: var(--moss-800);
        }

        @media (hover: hover) {
            .btn-confirm-yes:hover {
                background: var(--moss-700);
            }
        }

        @media (max-width: 480px) {
            .app-header {
                padding: 14px 16px;
            }

            .app-header h1 {
                font-size: 1.15rem;
            }

            .app-header .snail-icon svg {
                width: 30px;
                height: 30px;
            }

            .page {
                padding: 12px 10px calc(var(--tab-height) + 20px + env(safe-area-inset-bottom)) 10px;
            }

            .card {
                padding: 10px;
                gap: 10px;
            }

            .card-thumb {
                width: 60px;
                height: 60px;
            }

            .card-title {
                font-size: 0.95rem;
            }

            .card-meta {
                font-size: 0.75rem;
            }

            .detail-images {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }

            .detail-value.large {
                font-size: 1.15rem;
            }

            .btn-back {
                width: auto;
                padding: 10px 16px;
                font-size: 0.9rem;
            }
        }

        @media (min-width: 768px) {
            .page {
                padding: 24px 20px calc(var(--tab-height) + 28px) 20px;
            }

            .detail-images {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }
        }

        /* Stats Page */
        #stats-page {
            padding: 6px 8px calc(var(--tab-height) + 8px + env(safe-area-inset-bottom)) 8px;
            max-width: none;
            width: 100%;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #stats-page.active {
            display: flex;
        }

        .stats-header {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 4px;
            gap: 8px;
            flex-shrink: 0;
        }

        .stats-cards {
            position: absolute;
            left: 10px;
            top: 10px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* 移动端：卡片改为流式顶部横向布局 + 整个统计页严格一屏高度
           不用 100vh（Safari 底部工具栏会导致内容被挤出），改用 absolute + top/bottom 精确锁定 */
        @media (max-width: 768px) {
            /* iOS 上 type="date" 的 input 有浏览器默认大尺寸，强制与 text input 一致 */
            input[type="date"].form-input {
                -webkit-appearance: none;
                appearance: none;
                height: 42px !important;
                padding: 0 12px !important;
                font-size: 1rem !important;
                line-height: 1;
                box-sizing: border-box;
                min-height: 0;
            }

            #stats-page {
                position: absolute;
                top: 80px;
                left: 0;
                right: 0;
                bottom: calc(var(--tab-height) + env(safe-area-inset-bottom));
                height: auto;
                min-height: 0;
                padding: 4px 6px;
                overflow: hidden;
                box-sizing: border-box;
            }

            /* stats-header（返回全国按钮）：悬浮在右上角，不占额外一行 */
            .stats-header {
                position: absolute;
                top: 12px;
                right: 8px;
                margin: 0;
                z-index: 5;
            }

            /* 仅针对统计页的返回按钮：与左右两侧的 stat-card 高度/尺寸完全一致
               必须覆盖 .btn 基础类的 min-height:44px 和 width:100%，否则按钮永远被撑高
               不用全局 .btn-back，避免影响其他页面（筛选弹窗、地图弹窗等也用了 btn-back） */
            #stats-back-btn {
                min-height: 0 !important;
                height: auto !important;
                width: auto !important;
                padding: 4px 10px !important;
                font-size: 0.75rem !important;
                line-height: 1 !important;
                box-sizing: border-box;
            }

            #stats-back-btn svg {
                width: 0.75rem !important;
                height: 0.75rem !important;
            }

            /* 关键：嵌套 flex 每层都必须设 min-height:0 才能正确收缩，
               否则 Safari/Chrome 会让子元素撑开父容器导致超出一屏 */
            .stats-map-container {
                min-height: 0;
                height: auto;
                flex: 1;
            }

            .stats-map-wrapper {
                display: flex;
                flex-direction: column;
                min-height: 0;
                height: 100%;
                flex: 1;
            }

            /* 卡片：横向一行显示，右侧预留 ~90px 给返回按钮，避免文字被遮挡 */
            .stats-cards {
                position: static;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
                padding: 6px 90px 4px 8px;
                z-index: 1;
                width: 100%;
                box-sizing: border-box;
                flex-shrink: 0;
            }
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 6px;
            padding: 4px 10px;
            border: 1px solid var(--gray-100);
            white-space: nowrap;
            box-sizing: border-box;
            line-height: 1;
        }

        .stat-value {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--moss-600);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--gray-500);
        }

        .stats-map-container {
            max-width: 100%;
            width: 100%;
            margin: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .stats-map-wrapper {
            position: relative;
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--gray-100);
            overflow: hidden;
            width: 100%;
            flex: 1;
        }

        #stats-echarts {
            width: 100%;
            height: 100%;
            min-height: 450px;
        }

        /* 移动端：图表容器在 flex 中占据剩余空间，不设置固定高度 */
        @media (max-width: 768px) {
            #stats-echarts {
                flex: 1;
                min-height: 0;
                height: auto;
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            #stats-echarts {
                /* 小屏的最小视觉保护高度，不强制撑开 */
                min-height: 220px;
            }
        }

        .stats-legend {
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>螃蟹是也的蜗牛地图</h1>
        <p class="subtitle">中国本土蜗牛私人数据库</p>
    </div>

    <!-- Add Page -->
    <div class="page active" id="add-page">
        <form id="add-form" autocomplete="off">
            <div class="form-group">
                <label>中文名 <span class="required">*</span></label>
                <input class="form-input" type="text" id="input-chinese-name" placeholder="请输入蜗牛中文名" required>
            </div>
            <div class="form-group">
                <label>拉丁名</label>
                <input class="form-input" type="text" id="input-latin-name" placeholder="请输入拉丁学名（选填）">
            </div>
            <div class="form-group-row">
                <div class="form-group-half">
                    <label>纲</label>
                    <input class="form-input" type="text" id="input-phylum" placeholder="请输入纲" value="腹足纲">
                </div>
                <div class="form-group-half">
                    <label>目</label>
                    <input class="form-input" type="text" id="input-order" placeholder="请输入目">
                </div>
            </div>
            <div class="form-group-row">
                <div class="form-group-half">
                    <label>科</label>
                    <input class="form-input" type="text" id="input-species" placeholder="请输入科">
                </div>
                <div class="form-group-half">
                    <label>属</label>
                    <input class="form-input" type="text" id="input-genus" placeholder="请输入属">
                </div>
            </div>
            <div class="form-group">
                <label>采集地点</label>
                <div class="location-row">
                    <input class="form-input" type="text" id="input-location" placeholder="请输入采集地点">
                    <button type="button" class="btn-map-picker" id="btn-map-picker" title="在地图上选点">📍</button>
                </div>
                <input type="hidden" id="input-lat">
                <input type="hidden" id="input-lng">
            </div>
            <div class="form-group">
                <label>采集时间</label>
                <input class="form-input" type="date" id="input-time">
            </div>
            <div class="form-group">
                <label>属性分类 <span class="required">*</span></label>
                <select class="form-input" id="input-ecology-type" required>
                    <option value="淡水">淡水</option>
                    <option value="陆贝" selected>陆贝</option>
                    <option value="化石">化石</option>
                </select>
            </div>
            <div class="form-group">
                <label>图片（最多9张）</label>
                <div class="image-upload-area" id="image-upload-area">
                    <label class="image-upload-trigger" id="image-upload-trigger">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                        <span>添加图片</span>
                    </label>
                </div>
                <input type="file" id="image-input" accept="image/*" multiple style="display:none">
                <p class="image-upload-hint">支持 JPG/PNG，自动压缩至长边 1024px</p>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top:8px">保存记录</button>
        </form>
    </div>

    <!-- List Page -->
    <div class="page" id="list-page">
        <div class="search-box" id="list-search-box">
            <div class="search-box-inner">
                <input type="text" class="search-input" id="list-search-input" placeholder="搜索中文名、拉丁名、采集地点、纲、目、属、科..." style="flex: 1;">
                <div class="filter-dropdown-wrapper">
                    <button class="btn btn-primary" id="list-filter-btn" style="width: 80px; padding: 0 12px;">筛选</button>
                    <div class="filter-dropdown" id="list-filter-dropdown">
                        <div class="filter-dropdown-header">
                            <span>科属筛选</span>
                            <button class="filter-dropdown-close" id="list-filter-close">&times;</button>
                        </div>
                        <div class="filter-dropdown-body" id="list-filter-tree">
                        </div>
                        <div class="filter-dropdown-footer">
                            <button class="btn btn-back" id="list-filter-clear">清除</button>
                            <button class="btn btn-primary" id="list-filter-apply">确认</button>
                        </div>
                    </div>
                </div>
                <button class="search-clear-btn" id="list-search-clear" style="display:none;">&times;</button>
            </div>
        </div>
        <div class="data-toolbar">
            <button class="btn btn-back" id="btn-export-data" style="flex: 1;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>
                <span>导出数据</span>
            </button>
            <button class="btn btn-back" id="btn-import-data" style="flex: 1;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9m0 0l-4 4m4-4l4 4M4 3h16"/></svg>
                <span>导入数据</span>
            </button>
            <input type="file" id="import-file-input" accept=".json,application/json,*/*" style="display:none;">
        </div>
        <div class="card-list" id="card-list"></div>
        <div class="empty-state" id="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-3-3v6m-9 4V5a2 2 0 012-2h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
            <p>暂无记录，去录入吧</p>
        </div>
    </div>

    <!-- Detail Page -->
    <div class="page" id="detail-page">
        <button class="btn btn-back" id="btn-back" style="margin-bottom:16px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
            <span id="btn-back-text">返回列表</span>
        </button>
        <div id="detail-content"></div>
    </div>

    <!-- Species Records Page -->
    <div class="page" id="species-page">
        <button class="btn btn-back" id="btn-species-back" style="margin-bottom:16px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
            <span>返回物种列表</span>
        </button>
        <div id="species-title" style="margin-bottom:14px;font-weight:500;font-size:1.15rem;color:var(--moss-800);"></div>
        <div class="card-list" id="species-card-list"></div>
        <div class="empty-state" id="species-empty-state" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-3-3v6m-9 4V5a2 2 0 012-2h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
            <p>暂无记录</p>
        </div>
    </div>

    <!-- Map Page -->
    <div class="page" id="map-page">
        <div class="map-page-search" style="gap: 10px; align-items: stretch;">
            <input type="text" class="map-search-input" id="map-search-input" placeholder="搜索中文名、拉丁名、采集地点、纲、目、属、科..." style="flex: 1;">
            <div class="filter-dropdown-wrapper" style="display: flex; align-items: center;">
                <button class="btn btn-primary" id="map-filter-btn" style="width: 80px; padding: 0 12px;">筛选</button>
                <div class="filter-dropdown" id="map-filter-dropdown">
                    <div class="filter-dropdown-header">
                        <span>科属筛选</span>
                        <button class="filter-dropdown-close" id="map-filter-close">&times;</button>
                    </div>
                    <div class="filter-dropdown-body" id="map-filter-tree">
                    </div>
                    <div class="filter-dropdown-footer">
                        <button class="btn btn-back" id="map-filter-clear">清除</button>
                        <button class="btn btn-primary" id="map-filter-apply">确认</button>
                    </div>

    <script>
    (function() {
        var STORAGE_KEY = 'snail_db_records';
        var MAX_IMAGES = 9;
        var MAX_LONG_SIDE = 1024;
        var COMPRESS_QUALITY = 0.7;

        var imageStore = localforage.createInstance({ name: 'snail_db_images' });

        var pages = {
            'add-page': document.getElementById('add-page'),
            'list-page': document.getElementById('list-page'),
            'detail-page': document.getElementById('detail-page'),
            'map-page': document.getElementById('map-page'),
            'species-page': document.getElementById('species-page'),
            'stats-page': document.getElementById('stats-page')
        };

        var currentRecord = null;
        var pendingImages = []; // File objects for new entry
        var pendingLat = null;
        var pendingLng = null;
        var lastPage = null; // 记录从哪个页面进入详情页
        var currentInfoWindow = null; // 记录当前打开的信息窗
        var listSearchKeyword = ''; // 列表页搜索关键词
        var mapSearchKeyword = ''; // 地图页搜索关键词
        var currentSpecies = null; // 当前查看的物种
        var selectedFilters = {
            families: new Set(),
            genuses: new Set()
        };
        var isFilterActive = false; // 筛选是否生效
        var expandedFamilies = new Set(); // 记录展开的科

        // 搜索筛选函数
        // 提取物种key（括号外的名称）
        function getSpeciesKey(name) {
            if (!name) return '';
            var bracketIndex = name.indexOf('（');
            if (bracketIndex === -1) {
                bracketIndex = name.indexOf('(');
            }
            if (bracketIndex !== -1) {
                return name.substring(0, bracketIndex).trim();
            }
            return name.trim();
        }

        // 按物种聚合记录
        function aggregateBySpecies(records) {
            var speciesMap = {};
            records.forEach(function(record) {
                var speciesKey = getSpeciesKey(record.chineseName);
                if (!speciesMap[speciesKey]) {
                    speciesMap[speciesKey] = {
                        key: speciesKey,
                        chineseName: speciesKey,
                        latinName: record.latinName,
                        records: []
                    };
                }
                speciesMap[speciesKey].records.push(record);
            });
            
            var speciesList = Object.values(speciesMap);
            
            speciesList.sort(function(a, b) {
                var aHasDash = a.key.includes('-');
                var bHasDash = b.key.includes('-');
                
                if (aHasDash && !bHasDash) return 1;
                if (!aHasDash && bHasDash) return -1;
                
                return a.key.localeCompare(b.key, 'zh-CN');
            });
            
            speciesList.forEach(function(species) {
                species.records.sort(function(r1, r2) {
                    return (r2.createdAt || 0) - (r1.createdAt || 0);
                });
            });
            
            return speciesList;
        }

        function filterRecords(records, keyword) {
            if (!keyword || keyword.trim() === '') {
                return records;
            }
            var lowerKeyword = keyword.toLowerCase().trim();
            return records.filter(function(record) {
                return (record.chineseName && record.chineseName.toLowerCase().indexOf(lowerKeyword) !== -1) ||
                       (record.latinName && record.latinName.toLowerCase().indexOf(lowerKeyword) !== -1) ||
                       (record.location && record.location.toLowerCase().indexOf(lowerKeyword) !== -1) ||
                       (record.phylum && record.phylum.toLowerCase().indexOf(lowerKeyword) !== -1) ||
                       (record.order && record.order.toLowerCase().indexOf(lowerKeyword) !== -1) ||
                       (record.genus && record.genus.toLowerCase().indexOf(lowerKeyword) !== -1) ||
                       (record.species && record.species.toLowerCase().indexOf(lowerKeyword) !== -1);
            });
        }

        // IndexedDB 存储实例（主存储）
        var recordStore = localforage.createInstance({ name: 'snail_db_records' });
        
        // 数据已迁移标志
        var MIGRATION_FLAG = 'snail_db_migrated_to_indexeddb';
        
        // 零风险双存储系统：优先使用 IndexedDB，同时保留 localStorage 作为备份
        
        // 从存储加载记录（优先 IndexedDB，降级到 localStorage）
        async function loadRecords() {
            try {
                // 首先尝试从 IndexedDB 读取
                var records = await recordStore.getItem('records');
                if (records && Array.isArray(records)) {
                    return records;
                }
                
                // IndexedDB 没有数据，尝试从 localStorage 读取并迁移
                var localData = localStorage.getItem(STORAGE_KEY);
                if (localData) {
                    var localRecords = JSON.parse(localData);
                    if (Array.isArray(localRecords)) {
                        // 自动迁移到 IndexedDB
                        await recordStore.setItem('records', localRecords);
                        localStorage.setItem(MIGRATION_FLAG, '1');
                        return localRecords;
                    }
                }
                
                return [];
            } catch (e) {
                console.error('loadRecords error:', e);
                // IndexedDB 失败时降级到 localStorage
                try {
                    var data = localStorage.getItem(STORAGE_KEY);
                    return data ? JSON.parse(data) : [];
                } catch (e2) {
                    return [];
                }
            }
        }

        // 保存记录（主存储为 IndexedDB，不强制备份到 localStorage）
        async function saveRecords(records) {
            try {
                // 优先保存到 IndexedDB（主存储）
                await recordStore.setItem('records', records);
                // 尝试保存到 localStorage 作为备份，但如果失败（容量不足）也不影响
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                } catch (localErr) {
                    console.log('localStorage backup failed (likely quota exceeded), continuing with IndexedDB only');
                    // 不抛出错误，因为 IndexedDB 已经成功保存
                }
            } catch (e) {
                console.error('saveRecords error:', e);
                // IndexedDB 失败时尝试降级到 localStorage
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                } catch (localErr2) {
                    // 如果两个存储都失败了，抛出原始错误
                    throw e;
                }
            }
        }

        // 把 Blob 转成 base64 字符串（用于导出图片）
        function blobToBase64(blob) {
            return new Promise(function(resolve, reject) {
                var reader = new FileReader();
                reader.onloadend = function() {
                    resolve(reader.result);
                };
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        // 把 base64 字符串转成 Blob（用于导入图片）
        function base64ToBlob(base64) {
            var arr = base64.split(',');
            var mime = arr[0].match(/:(.*?);/)[1];
            var bstr = atob(arr[1]);
            var n = bstr.length;
            var u8 = new Uint8Array(n);
            while (n--) {
                u8[n] = bstr.charCodeAt(n);
            }
            return new Blob([u8], { type: mime });
        }

        // 获取图片数据（兼容Base64和Blob格式）
        async function getImageAsBlob(imageData) {
            if (!imageData) return null;
            // 如果是Base64字符串，转换为Blob
            if (typeof imageData === 'string' && imageData.startsWith('data:')) {
                return base64ToBlob(imageData);
            }
            // 如果已经是Blob/File对象，直接返回
            if (imageData instanceof Blob) {
                return imageData;
            }
            return null;
        }

        // 导出全部数据（文本记录 + 图片）
        async function exportAllData() {
            try {
                showToast('正在导出...');
                var records = await loadRecords();
                var images = {};

                for (var i = 0; i < records.length; i++) {
                    var r = records[i];
                    for (var j = 0; j < r.imageCount; j++) {
                        var key = 'img_' + r.id + '_' + j;
                        try {
                            var blob = await imageStore.getItem(key);
                            if (blob) {
                                images[key] = await blobToBase64(blob);
                            }
                        } catch (imgErr) {
                            console.warn('导出图片失败: ' + key, imgErr);
                        }
                    }
                }

                var exportObj = {
                    version: 1,
                    exportedAt: new Date().toISOString(),
                    recordCount: records.length,
                    imageCount: Object.keys(images).length,
                    records: records,
                    images: images
                };

                var jsonStr = JSON.stringify(exportObj);
                var blob = new Blob([jsonStr], { type: 'application/json' });
                var url = URL.createObjectURL(blob);

                var a = document.createElement('a');
                var now = new Date();
                var dateStr = now.getFullYear() + '' +
                    String(now.getMonth() + 1).padStart(2, '0') +
                    String(now.getDate()).padStart(2, '0') + '_' +
                    String(now.getHours()).padStart(2, '0') +
                    String(now.getMinutes()).padStart(2, '0');
                a.href = url;
                a.download = '蜗牛地图数据备份_' + dateStr + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(function() { URL.revokeObjectURL(url); }, 1000);

                showToast('导出成功：共 ' + records.length + ' 条记录，' + Object.keys(images).length + ' 张图片');
            } catch (err) {
                console.error('导出失败:', err);
                showToast('导出失败：' + (err.message || err));
            }
        }

        // 导入全部数据（带差异分析）
        async function importAllData(file) {
            try {
                showToast('正在读取文件...');

                // 1. 读取导入文件
                var text = await new Promise(function(resolve, reject) {
                    var reader = new FileReader();
                    reader.onload = function(e) { resolve(e.target.result); };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });

                var data = JSON.parse(text);
                if (!data || !Array.isArray(data.records) || typeof data.images !== 'object') {
                    throw new Error('文件格式不正确');
                }

                // 2. 读取当前本地数据，对比差异
                var currentRecords = await loadRecords();
                var currentIds = {};
                for (var i = 0; i < currentRecords.length; i++) {
                    currentIds[currentRecords[i].id] = true;
                }

                var importIds = {};
                for (var j = 0; j < data.records.length; j++) {
                    importIds[data.records[j].id] = true;
                }

                var newCount = 0;      // 导入文件有、当前没有的
                var updateCount = 0;   // 两边都有的
                var missingCount = 0;  // 当前有、导入文件没有的（将被删除）

                for (var k = 0; k < data.records.length; k++) {
                    if (currentIds[data.records[k].id]) {
                        updateCount++;
                    } else {
                        newCount++;
                    }
                }
                for (var m = 0; m < currentRecords.length; m++) {
                    if (!importIds[currentRecords[m].id]) {
                        missingCount++;
                    }
                }

                // 3. 生成差异提示
                var msg = '【导入前差异分析】\n\n' +
                    '· 当前设备：' + currentRecords.length + ' 条记录\n' +
                    '· 导入文件：' + data.records.length + ' 条记录\n' +
                    '· 新增：' + newCount + ' 条（导入文件新增）\n' +
                    '· 相同：' + updateCount + ' 条（两边都有）\n' +
                    '· ⚠️ 将被删除：' + missingCount + ' 条（当前有、导入文件没有）\n\n' +
                    '导入后将以导入文件为准覆盖当前数据。\n\n' +
                    '建议：如果"将被删除"大于 0，请确认这份导入文件是否为最新版本后再继续。';

                if (!confirm(msg)) {
                    return;
                }

                showToast('正在导入...');

                // 4. 清空现有数据
                try {
                    await recordStore.removeItem('records');
                    var keys = await imageStore.keys();
                    for (var k2 = 0; k2 < keys.length; k2++) {
                        await imageStore.removeItem(keys[k2]);
                    }
                } catch (clearErr) {
                    console.warn('清空旧数据时出错（可能原本为空）:', clearErr);
                }

                // 5. 写入文本记录
                await recordStore.setItem('records', data.records);
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data.records));
                } catch (localErr) {
                    // localStorage 容量不足时忽略，主存储仍有效
                }

                // 6. 写入图片 (直接存储Base64，无需转换)
                var imgKeys = Object.keys(data.images);
                for (var m2 = 0; m2 < imgKeys.length; m2++) {
                    var imgKey = imgKeys[m2];
                    try {
                        await imageStore.setItem(imgKey, data.images[imgKey]);
                    } catch (imgErr) {
                        console.warn('导入图片失败: ' + imgKey, imgErr);
                    }
                }

                showToast('导入成功：共 ' + data.records.length + ' 条记录，' + imgKeys.length + ' 张图片');
                // 刷新页面以重新加载
                setTimeout(function() { location.reload(); }, 800);
            } catch (err) {
                console.error('导入失败:', err);
                showToast('导入失败：' + (err.message || err));
            }
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
        }

        // Page switching
        async function switchPage(pageName) {
            Object.keys(pages).forEach(function(k) {
                pages[k].classList.remove('active');
            });
            pages[pageName].classList.add('active');

            document.querySelectorAll('.tab-item').forEach(function(tab) {
                tab.classList.toggle('active', tab.dataset.page === pageName);
            });

            if (pageName === 'list-page') {
                await renderList();
            } else if (pageName === 'map-page') {
                await initRecordMap();
            }
        }

        // Map page variables
        var recordMap = null;
        var mapInitialized = false;
        var currentMarkers = [];
        var recordMarkersMap = {}; // 记录ID和对应标记的映射

        // Initialize record map
        async function initRecordMap() {
            if (typeof AMap === 'undefined') {
                return;
            }

            if (!mapInitialized) {
                // 首次初始化地图
                requestAnimationFrame(function() {
                    requestAnimationFrame(async function() {
                        try {
                            var satellite = new AMap.TileLayer.Satellite();
                            var roadNet = new AMap.TileLayer.RoadNet();

                            recordMap = new AMap.Map('record-map', {
                                zoom: 5,
                                center: [100, 35],
                                layers: [satellite, roadNet],
                                isHotspot: false
                            });

                            mapInitialized = true;

                            recordMap.on('complete', async function() {
                                recordMap.resize();
                                await loadMarkersToMap();
                            });

                            // 确保地图加载完成后再次调用 resize
                            setTimeout(async function() {
                                recordMap && recordMap.resize();
                            }, 300);

                            await loadMarkersToMap();
                        } catch (e) {
                            console.error('Map init error:', e);
                        }
                    });
                });
            } else {
                // 地图已初始化，重新加载标记并调整大小
                setTimeout(async function() {
                    recordMap && recordMap.resize();
                    await loadMarkersToMap();
                }, 100);
            }
        }

        // Load markers from records
        async function loadMarkersToMap() {
            if (!recordMap) return;

            // 清除旧的标记
            if (currentMarkers.length > 0) {
                recordMap.remove(currentMarkers);
                currentMarkers = [];
            }
            recordMarkersMap = {}; // 重置映射

            var records = await loadRecords();
            var validRecords = records.filter(function(r) {
                return r.lat && r.lng;
            });

            // 应用搜索筛选和科属筛选
            var filteredRecords = filterRecords(validRecords, mapSearchKeyword);
            filteredRecords = filteredRecords.filter(matchesFilter);

            if (filteredRecords.length === 0) {
                recordMap.setZoomAndCenter(5, [100, 35]);
                return;
            }

            var markerList = [];
            var markerDataList = [];

            filteredRecords.forEach(function(record) {
                var markerData = createRecordMarker(record);
                markerList.push(markerData.marker);
                markerDataList.push(markerData);
                recordMarkersMap[record.id] = markerData;
            });

            recordMap.add(markerList);
            currentMarkers = markerList;

            // 调整视野适应所有标记，防止被搜索框或Tab栏遮挡
            if (markerList.length > 0) {
                setTimeout(function() {
                    recordMap.setFitView(markerList, true, [152, 30, 140, 30]);
                }, 800);
            }
        }

        // 更新地图标记显示（用于搜索筛选时动态更新）
        async function updateMarkersBySearch() {
            await loadMarkersToMap();
        }

        // Create marker for a record
        function createRecordMarker(record) {
            // 根据属性分类选择SVG图标颜色（自定义，不依赖外部图片）
            var color = '#1e88e5'; // 蓝色-淡水
            if (record.ecologyType === '陆贝') {
                color = '#e53935'; // 红色
            } else if (record.ecologyType === '化石') {
                color = '#fdd835'; // 黄色
            }
            
            // 画一个更精致的水滴形SVG标记（带阴影和圆角，无注释避免XML错误）
            var svgContent = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40">' +
                '<defs><filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">' +
                '<feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/></filter></defs>' +
                '<path d="M14 0C6.268 0 0 6.268 0 14c0 3.866 1.51 7.353 4.193 10.323C6.837 27.22 10.957 31.7 14 40' +
                'c3.043-8.3 7.163-12.78 9.807-15.677C26.49 21.353 28 17.866 28 14 28 6.268 21.732 0 14 0z"' +
                ' fill="' + color + '" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" filter="url(#shadow)"/>' +
                '<ellipse cx="14" cy="10" rx="4" ry="5" fill="rgba(255,255,255,0.4)"/>' +
                '</svg>';
            
            var iconUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgContent);
            
            var icon = new AMap.Icon({
                image: iconUrl,
                size: new AMap.Size(28, 40),
                imageSize: new AMap.Size(28, 40),
                anchor: new AMap.Pixel(14, 40)
            });
            
            var marker = new AMap.Marker({
                position: [record.lng, record.lat],
                map: recordMap,
                icon: icon,
                offset: new AMap.Pixel(-10, -35)
            });

            var infoWindow = null;
            var isMouseOverInfoWindow = false;
            var isMouseOverMarker = false;
            var hasAdjustedMap = false; // 防止重复移动标记

            var closeInfoWindow = function() {
                setTimeout(function() {
                    if (!isMouseOverInfoWindow && !isMouseOverMarker) {
                        if (infoWindow) {
                            infoWindow.close();
                            infoWindow = null;
                        }
                    }
                }, 150);
            };

            var showInfoWindow = function(e) {
                isMouseOverMarker = true;
                hasAdjustedMap = false; // 重置标记
                if (e && e.stopPropagation) {
                    e.stopPropagation();
                }

                if (infoWindow) {
                    infoWindow.close();
                }

                var content = createInfoWindowContent(record);

                infoWindow = new AMap.InfoWindow({
                    content: content,
                    offset: new AMap.Pixel(4, -40),
                    closeWhenClickMap: true,
                    autoMove: false,
                    closeButton: false
                });

                infoWindow.open(recordMap, marker.getPosition());

                // 仅在信息窗被搜索框遮挡时才调整地图位置
                setTimeout(function() {
                    if (recordMap && !hasAdjustedMap) {
                        hasAdjustedMap = true;
                        // 获取所有弹窗元素，取最后一个（最新打开的）
                        var infoWinEls = document.querySelectorAll('.amap-info');
                        if (infoWinEls.length === 0) return;
                        var infoWinEl = infoWinEls[infoWinEls.length - 1];
                        
                        // 检查弹窗是否可见（防止获取到正在关闭的弹窗）
                        var isVisible = infoWinEl.offsetParent !== null;
                        if (!isVisible) return;
                        
                        var infoWinRect = infoWinEl.getBoundingClientRect();
                        var topBarHeight = 122; // 顶部栏（标题+搜索框）高度
                        
                        // 只检查信息窗顶部是否被搜索框遮挡
                        if (infoWinRect.top < topBarHeight) {
                            // 获取当前中心点
                            var currentCenter = recordMap.getCenter();
                            var centerPixel = recordMap.lngLatToContainer(currentCenter);
                            
                            // 计算需要移动的距离，刚好让信息窗完整露出，再加10px间距
                            var offset = topBarHeight - infoWinRect.top + 10;
                            // 正确的移动方向：centerPixel.y -= offset（地图向下移动，信息窗整体下移）
                            centerPixel.y -= offset;
                            
                            var newCenter = recordMap.containerToLngLat(centerPixel);
                            // 用丝滑缓慢的速度移动，600ms
                            recordMap.panTo(newCenter, 600);
                        }
                    }
                }, 500);

                var imgKey = 'img_' + record.id + '_0';
                var wrapEl = content.querySelector('.map-info-thumb-wrap');

                imageStore.getItem(imgKey).then(function(imgData) {
                    if (imgData && wrapEl) {
                        var blob = new Blob([imgData], { type: 'image/jpeg' });
                        var blobUrl = URL.createObjectURL(blob);

                        var img = document.createElement('img');
                        img.className = 'map-info-thumb';
                        img.src = blobUrl;
                        img.alt = record.chineseName || '缩略图';
                        img.onload = function() {
                            if (wrapEl) {
                                wrapEl.innerHTML = '';
                                wrapEl.appendChild(img);
                            }
                        };
                        img.onerror = function() {
                            if (wrapEl) {
                                wrapEl.innerHTML = '<span class="map-info-placeholder">📷</span>';
                            }
                        };
                    } else if (wrapEl) {
                        wrapEl.innerHTML = '<span class="map-info-placeholder">📷</span>';
                    }
                }).catch(function() {
                    if (wrapEl) {
                        wrapEl.innerHTML = '<span class="map-info-placeholder">📷</span>';
                    }
                });

                // 绑定点击事件 - 直接在 content 上绑定
                content.onclick = function(ev) {
                    ev.stopPropagation();
                    ev.preventDefault();
                    lastPage = 'map-page';
                    currentInfoWindow = infoWindow;
                    showDetail(record);
                };

                // 延迟查找 info window 外层并绑定鼠标事件
                setTimeout(function() {
                    var winOuter = document.querySelector('.amap-info');
                    if (winOuter) {
                        winOuter.style.cursor = 'pointer';
                        
                        winOuter.onclick = function(ev) {
                            ev.stopPropagation();
                            ev.preventDefault();
                            lastPage = 'map-page';
                            currentInfoWindow = infoWindow;
                            showDetail(record);
                        };
                        
                        winOuter.onmouseenter = function() {
                            isMouseOverInfoWindow = true;
                        };
                        
                        winOuter.onmouseleave = function() {
                            isMouseOverInfoWindow = false;
                            closeInfoWindow();
                        };
                    }
                }, 50);
            }

            // 鼠标悬停显示信息窗
            marker.on('mouseover', showInfoWindow);
            marker.on('mouseout', function() {
                isMouseOverMarker = false;
                closeInfoWindow();
            });
            // 点击标记点也可以进入详情页
            marker.on('click', function(e) {
                e.stopPropagation();
                lastPage = 'map-page';
                currentInfoWindow = infoWindow;
                showDetail(record);
            });
            marker.on('touchstart', showInfoWindow);

            return {
                marker: marker,
                record: record,
                showInfoWindow: showInfoWindow
            };
        }
