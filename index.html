        // Image compression
        function compressImage(file) {
            return new Promise(function(resolve, reject) {
                var img = new Image();
                var url = URL.createObjectURL(file);
                img.onload = function() {
                    URL.revokeObjectURL(url);
                    var w = img.width;
                    var h = img.height;
                    if (w <= MAX_LONG_SIDE && h <= MAX_LONG_SIDE) {
                        resolve(file);
                        return;
                    }
                    var ratio = MAX_LONG_SIDE / Math.max(w, h);
                    var canvas = document.createElement('canvas');
                    canvas.width = Math.round(w * ratio);
                    canvas.height = Math.round(h * ratio);
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob(function(blob) {
                        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                    }, 'image/jpeg', COMPRESS_QUALITY);
                };
                img.onerror = function() {
                    URL.revokeObjectURL(url);
                    reject(new Error('图片加载失败'));
                };
                img.src = url;
            });
        }

        // Image upload handling
        var imageUploadTrigger = document.getElementById('image-upload-trigger');
        var imageInput = document.getElementById('image-input');
        var imageUploadArea = document.getElementById('image-upload-area');

        imageUploadTrigger.addEventListener('click', function() {
            imageInput.click();
        });

        imageInput.addEventListener('change', async function() {
            var files = Array.from(imageInput.files);
            var available = MAX_IMAGES - pendingImages.length;
            if (files.length > available) {
                showToast('最多还能添加 ' + available + ' 张图片');
                files = files.slice(0, available);
            }
            for (var i = 0; i < files.length; i++) {
                try {
                    var compressed = await compressImage(files[i]);
                    pendingImages.push(compressed);
                } catch (e) {
                    showToast('图片处理失败');
                }
            }
            imageInput.value = '';
            renderImagePreviews();
        });

        function renderImagePreviews() {
            var existing = imageUploadArea.querySelectorAll('.image-preview-item');
            existing.forEach(function(el) { el.remove(); });

            pendingImages.forEach(function(file, index) {
                var item = document.createElement('div');
                item.className = 'image-preview-item';
                item.draggable = true;
                item.dataset.index = index;
                var img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                var removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '&times;';
                removeBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    URL.revokeObjectURL(img.src);
                    pendingImages.splice(index, 1);
                    renderImagePreviews();
                });
                item.appendChild(img);
                item.appendChild(removeBtn);
                item.addEventListener('dragstart', handleDragStartAdd);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('drop', handleDropAdd);
                item.addEventListener('dragend', handleDragEnd);
                imageUploadArea.insertBefore(item, imageUploadTrigger);
            });

            if (pendingImages.length >= MAX_IMAGES) {
                imageUploadTrigger.style.display = 'none';
            } else {
                imageUploadTrigger.style.display = '';
            }
        }

            if (!chineseName) {
                showToast('请输入中文名');
                return;
            }

            var ecologyType = document.getElementById('input-ecology-type').value;
            if (!ecologyType) {
                showToast('请选择生态类型');
                return;
            }

            var record = {
                id: generateId(),
                chineseName: chineseName,
                latinName: document.getElementById('input-latin-name').value.trim(),
                phylum: document.getElementById('input-phylum').value.trim(),

                species: document.getElementById('input-species').value.trim(),
                location: document.getElementById('input-location').value.trim(),
                time: document.getElementById('input-time').value,
                ecologyType: ecologyType,
                lat: pendingLat || null,
                lng: pendingLng || null,
                imageCount: pendingImages.length,
                createdAt: Date.now()
            };

            try {
                // Save images to IndexedDB (as Base64 for better compatibility)
                for (var i = 0; i < pendingImages.length; i++) {
                    var key = 'img_' + record.id + '_' + i;
                    var base64 = await blobToBase64(pendingImages[i]);
                    await imageStore.setItem(key, base64);
                }

                // Save text to storage (IndexedDB + localStorage)
                var records = await loadRecords();
                records.unshift(record);
                await saveRecords(records);

                // Clear form
                document.getElementById('add-form').reset();
                // 重置默认值
                document.getElementById('input-phylum').value = '腹足纲';
                document.getElementById('input-ecology-type').value = '陆贝';
                pendingImages.forEach(function(f) {
                    if (f._url) URL.revokeObjectURL(f._url);
                });
                pendingImages = [];
                pendingLat = null;
                pendingLng = null;
                document.getElementById('input-lat').value = '';
                document.getElementById('input-lng').value = '';
                renderImagePreviews();

                showToast('保存成功');
            } catch (err) {
                showToast('保存失败: ' + err.message);
            }
        });

        // 加载编辑模式的图片
        async function loadEditImages(record) {
            for (var i = 0; i < record.imageCount; i++) {
                try {
                    var data = await imageStore.getItem('img_' + record.id + '_' + i);
                    var blob = await getImageAsBlob(data);
                    if (blob) {
                        // 创建一个临时的 File 对象
                        var file = new File([blob], 'image_' + i + '.jpg', { type: blob.type || 'image/jpeg' });
                        editPendingImages.push(file);
                    }
                } catch (e) {}
            }
            renderEditImagePreviews();
        }

    // 渲染编辑模式的图片预览
    function renderEditImagePreviews() {
        var editImageUploadArea = document.getElementById('edit-image-upload-area');
        if (!editImageUploadArea) return;
        
        editImageUploadArea.innerHTML = '';

        // 渲染已有图片
        editPendingImages.forEach(function(file, index) {
            var item = document.createElement('div');
            item.className = 'image-preview-item';
            item.draggable = true;
            item.dataset.index = index;
            
            var img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            
            var removeBtn = document.createElement('button');
            removeBtn.className = 'remove-btn';
            removeBtn.innerHTML = '&times;';
            removeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                editPendingImages.splice(index, 1);
                renderEditImagePreviews();
            });
            
            item.appendChild(img);
            item.appendChild(removeBtn);
            
            // 拖拽功能
            item.addEventListener('dragstart', handleDragStart);
            item.addEventListener('dragover', handleDragOver);
            item.addEventListener('drop', handleDrop);
            item.addEventListener('dragend', handleDragEnd);
            
            editImageUploadArea.appendChild(item);
        });

        // 添加图片按钮（在最后）
        if (editPendingImages.length < 9) {
            var trigger = document.createElement('label');
            trigger.className = 'image-upload-trigger';
            trigger.id = 'edit-image-upload-trigger';
            trigger.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>添加图片</span>';
            editImageUploadArea.appendChild(trigger);
            
            trigger.addEventListener('click', function() {
                document.getElementById('edit-image-input').click();
            });
        }
    }

    // 拖拽排序变量
    var dragSrcEl = null;

    function handleDragStart(e) {
        dragSrcEl = this;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/html', this.outerHTML);
        this.classList.add('dragging');
    }

    function handleDragOver(e) {
        if (e.preventDefault) {
            e.preventDefault();
        }
        e.dataTransfer.dropEffect = 'move';
        return false;
    }

    function handleDrop(e) {
        e.stopPropagation();
        if (dragSrcEl != this) {
            var fromIndex = parseInt(dragSrcEl.dataset.index);
            var toIndex = parseInt(this.dataset.index);
            
            // 交换图片
            var temp = editPendingImages[fromIndex];
            editPendingImages[fromIndex] = editPendingImages[toIndex];
            editPendingImages[toIndex] = temp;
            
            renderEditImagePreviews();
        }
        return false;
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        dragSrcEl = null;
    }

    // 录入页面拖拽处理
    function handleDragStartAdd(e) {
        dragSrcEl = this;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/html', this.outerHTML);
        this.classList.add('dragging');
    }

    function handleDropAdd(e) {
        e.stopPropagation();
        if (dragSrcEl != this) {
            var fromIndex = parseInt(dragSrcEl.dataset.index);
            var toIndex = parseInt(this.dataset.index);
            
            // 交换图片
            var temp = pendingImages[fromIndex];
            pendingImages[fromIndex] = pendingImages[toIndex];
            pendingImages[toIndex] = temp;
            
            renderImagePreviews();
        }
        return false;
    }

    // 保存编辑后的记录
    async function saveEditRecord(oldRecord) {
        var chineseName = document.getElementById('edit-chinese-name').value.trim();
        if (!chineseName) {
            showToast('请输入中文名');
            return;
        }

        var ecologyType = document.getElementById('edit-ecology-type').value;
        if (!ecologyType) {
            showToast('请选择生态类型');
            return;
        }

        var updatedRecord = {
            id: oldRecord.id,
            chineseName: chineseName,
            latinName: document.getElementById('edit-latin-name').value.trim(),
            phylum: document.getElementById('edit-phylum').value.trim(),
            order: document.getElementById('edit-order').value.trim(),
            genus: document.getElementById('edit-genus').value.trim(),
            species: document.getElementById('edit-species').value.trim(),
            location: document.getElementById('edit-location').value.trim(),
            time: document.getElementById('edit-time').value,
            ecologyType: ecologyType,
            lat: editPendingLat,
            lng: editPendingLng,
            imageCount: editPendingImages.length,
            createdAt: oldRecord.createdAt
        };

        try {
            // 删除旧图片
            for (var j = 0; j < oldRecord.imageCount; j++) {
                await imageStore.removeItem('img_' + oldRecord.id + '_' + j);
            }
            
            // 保存新图片 (as Base64 for better compatibility)
            for (var k = 0; k < editPendingImages.length; k++) {
                var key = 'img_' + oldRecord.id + '_' + k;
                var base64 = await blobToBase64(editPendingImages[k]);
                await imageStore.setItem(key, base64);
            }
            
            // 更新记录
            var records = await loadRecords();
            var index = records.findIndex(function(r) { return r.id === oldRecord.id; });
            if (index !== -1) {
                records[index] = updatedRecord;
                await saveRecords(records);
            }
            
            currentRecord = updatedRecord;
            showToast('保存成功');
            renderDetailView(updatedRecord, false);
        } catch (e) {
            showToast('保存失败: ' + e.message);
        }
    }

                                            resultsEl.innerHTML = '';

                                            if (tips.length > 0) {
                                                tips.forEach(function(tip) {
                                                    var item = document.createElement('div');
                                                    item.className = 'map-search-result-item';
                                                    // 组合完整的地址信息显示
                                                    var fullAddr = '';
                                                    if (tip.province) fullAddr += tip.province;
                                                    if (tip.city && tip.city !== tip.province) fullAddr += tip.city;
                                                    if (tip.district) fullAddr += tip.district;
                                                    if (tip.address) fullAddr += tip.address;
                                                    item.innerHTML = '<div class="result-name">' + escapeHtml(tip.name) + '</div>' +
                                                        '<div class="result-addr">' + escapeHtml(fullAddr || tip.address || '') + '</div>';

        // 选择搜索结果，并使用反向地理编码获取完整地址
        function selectSearchResultWithGeocode(name, lng, lat) {
            clearSearchResults();
            pickedLat = lat;
            pickedLng = lng;

            // 清除旧的标记
            if (pickMarker) {
                mapInstance.remove(pickMarker);
            }
            // 添加新的标记点
            pickMarker = new AMap.Marker({
                position: [lng, lat],
                map: mapInstance,
                icon: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png'
            });

            // 移动地图到选中位置
            mapInstance.setZoomAndCenter(16, [lng, lat]);

            // 调用反向地理编码获取完整地址
            geocoder.getAddress([lng, lat], function(status, result) {
                if (status === 'complete' && result.regeocode) {
                    pickedAddress = result.regeocode.formattedAddress;
                } else {
                    pickedAddress = name;
                }
                // 显示确认对话框
                showConfirm(pickedAddress);
            });
        }

        function onMapClick(e) {
            clearSearchResults();
            clearSearchMarker();
            pickedLat = e.lnglat.getLat();
            pickedLng = e.lnglat.getLng();

            if (pickMarker) {
                mapInstance.remove(pickMarker);
            }

            pickMarker = new AMap.Marker({
                position: [pickedLng, pickedLat],
                map: mapInstance,
                icon: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png'
            });

            geocoder.getAddress([pickedLng, pickedLat], function(status, result) {
                if (status === 'complete' && result.info === 'OK') {
                    pickedAddress = result.regeocode.formattedAddress || '未知地址';
                } else {
                    pickedAddress = pickedLat.toFixed(6) + ', ' + pickedLng.toFixed(6);
                }
                showConfirm(pickedAddress);
            });
        }

        // ===== Filter Functions =====
        
        // 构建科属树形数据
        async function buildFilterTree() {
            var records = await loadRecords();
            var tree = {};
            
            records.forEach(function(record) {
                var family = record.species || '未分类';
                var genus = record.genus || '未知属';
                var speciesKey = getSpeciesKey(record.chineseName);
                
                if (!tree[family]) {
                    tree[family] = {
                        genuses: new Map(),
                        speciesSet: new Set()
                    };
                }
                
                tree[family].speciesSet.add(speciesKey);
                
                if (!tree[family].genuses.has(genus)) {
                    tree[family].genuses.set(genus, new Set());
                }
                tree[family].genuses.get(genus).add(speciesKey);
            });
            
            return Object.keys(tree).map(function(family) {
                var familyData = tree[family];
                return {
                    name: family,
                    speciesCount: familyData.speciesSet.size,
                    genuses: Array.from(familyData.genuses.entries()).map(function([genus, species]) {
                        return {
                            name: genus,
                            speciesCount: species.size
                        };
                    }).sort(function(a, b) {
                        return a.name.localeCompare(b.name);
                    })
                };
            }).sort(function(a, b) {
                return a.name.localeCompare(b.name);
            });
        }

        // 渲染筛选树（指定容器）
        async function renderFilterTree(containerId) {
            var tree = await buildFilterTree();
            var container = document.getElementById(containerId);
            container.innerHTML = '';
            
            tree.forEach(function(item) {
                var familyDiv = document.createElement('div');
                familyDiv.className = 'filter-family';
                familyDiv.dataset.family = item.name;
                
                var header = document.createElement('div');
                header.className = 'filter-family-header';
                header.innerHTML = '<div class="filter-family-toggle">▶</div>';
                
                var familyCheck = document.createElement('input');
                familyCheck.type = 'checkbox';
                familyCheck.id = containerId + '-family-' + item.name;
                familyCheck.checked = selectedFilters.families.has(item.name);
                familyCheck.addEventListener('change', async function() {
                    await toggleFamily(item.name, item.genuses, this.checked, containerId);
                });
                
                var familyLabel = document.createElement('label');
                familyLabel.htmlFor = containerId + '-family-' + item.name;
                familyLabel.textContent = item.name + ' (' + item.speciesCount + ')';
                
                header.appendChild(familyCheck);
                header.appendChild(familyLabel);
                
                // 展开/收起事件
                header.addEventListener('click', function(e) {
                    if (e.target !== familyCheck && e.target !== familyLabel) {
                        toggleFamilyExpand(familyDiv, item.name);
                    }
                });
                
                var genusList = document.createElement('div');
                genusList.className = 'filter-genus-list';
                
                item.genuses.forEach(function(genus) {
                    var genusItem = document.createElement('div');
                    genusItem.className = 'filter-genus-item';
                    
                    var genusCheck = document.createElement('input');
                    genusCheck.type = 'checkbox';
                    genusCheck.id = containerId + '-genus-' + item.name + '-' + genus.name;
                    genusCheck.checked = selectedFilters.genuses.has(item.name + '|' + genus.name);
                    genusCheck.addEventListener('change', async function() {
                        await toggleGenus(item.name, genus.name, this.checked, containerId);
                    });
                    
                    var genusLabel = document.createElement('label');
                    genusLabel.htmlFor = containerId + '-genus-' + item.name + '-' + genus.name;
                    genusLabel.textContent = genus.name + ' (' + genus.speciesCount + ')';
                    
                    genusItem.appendChild(genusCheck);
                    genusItem.appendChild(genusLabel);
                    genusList.appendChild(genusItem);
                });
                
                // 恢复展开状态
                if (expandedFamilies.has(item.name)) {
                    header.querySelector('.filter-family-toggle').classList.add('expanded');
                    genusList.classList.add('expanded');
                }
                
                familyDiv.appendChild(header);
                familyDiv.appendChild(genusList);
                container.appendChild(familyDiv);
            });
        }

        // 切换科的展开/收起
        function toggleFamilyExpand(familyDiv, familyName) {
            var toggle = familyDiv.querySelector('.filter-family-toggle');
            var genusList = familyDiv.querySelector('.filter-genus-list');
            
            if (expandedFamilies.has(familyName)) {
                expandedFamilies.delete(familyName);
                toggle.classList.remove('expanded');
                genusList.classList.remove('expanded');
            } else {
                expandedFamilies.add(familyName);
                toggle.classList.add('expanded');
                genusList.classList.add('expanded');
            }
        }

        // 切换科的勾选
        async function toggleFamily(family, genuses, checked, containerId) {
            if (checked) {
                selectedFilters.families.add(family);
                genuses.forEach(function(genus) {
                    selectedFilters.genuses.add(family + '|' + genus.name);
                });
            } else {
                selectedFilters.families.delete(family);
                genuses.forEach(function(genus) {
                    selectedFilters.genuses.delete(family + '|' + genus.name);
                });
            }
            await renderFilterTree(containerId);
        }

        // 切换属的勾选
        async function toggleGenus(family, genus, checked, containerId) {
            var key = family + '|' + genus;
            if (checked) {
                selectedFilters.genuses.add(key);
            } else {
                selectedFilters.genuses.delete(key);
                selectedFilters.families.delete(family);
            }
            await renderFilterTree(containerId);
        }

        async function getStatsData() {
            var records = await loadRecords();
            var speciesMap = {};
            var provinceMap = {};
            var cityMap = {};
            
            records.forEach(function(record) {
                var speciesKey = getSpeciesKey(record.chineseName);
                speciesMap[speciesKey] = (speciesMap[speciesKey] || 0) + 1;
                
                if (record.location) {
                    var province = guessProvince(record.location);
                    if (province) {
                        provinceMap[province] = provinceMap[province] || { species: new Set(), records: 0 };
                        provinceMap[province].species.add(speciesKey);
                        provinceMap[province].records++;
                        
                        var city = guessCity(record.location);
                        if (city && province) {
                            var key = province + '|' + city;
                            cityMap[key] = cityMap[key] || { species: new Set(), records: 0 };
                            cityMap[key].species.add(speciesKey);
                            cityMap[key].records++;
                        }
                    }
                }
            });
            
            return {
                totalSpecies: Object.keys(speciesMap).length,
                totalRecords: records.length,
                provinceMap: provinceMap,
                cityMap: cityMap
            };
        }
        
        function getColorByCount(count, maxCount) {
            if (count === 0) return '#E8F0E9';
            var ratio = count / maxCount;
            if (ratio < 0.2) return '#A7BDAE';
            if (ratio < 0.4) return '#7D9E88';
            if (ratio < 0.6) return '#5A7D66';
            return '#3D5A45';
        }

                    return;

                if (!statsChart) {
                    statsChart = echarts.init(chartDom);
                    
                    // 绑定省份点击事件（在初始化时绑定）
                    statsChart.on('click', function(params) {

        async function renderCityChart(provinceName) {
            window.__tipProvince = null;
            var chartDom = document.getElementById('stats-echarts');
            if (!chartDom) return;
            
            var stats = await getStatsData();
            var barData = [];
            var maxSpecies = 0;
            var maxRecords = 0;
            
            // 更新顶部卡片为该省的统计
            var provinceStats = stats.provinceMap[provinceName];
            if (provinceStats) {
                document.getElementById('stats-total-species').textContent = provinceStats.species.size;
                document.getElementById('stats-total-records').textContent = provinceStats.records;
            } else {
                document.getElementById('stats-total-species').textContent = 0;
                document.getElementById('stats-total-records').textContent = 0;
            }
            
            // 从 cityMap 中找出该省的所有城市
            for (var key in stats.cityMap) {
                var parts = key.split('|');
                if (parts[0] === provinceName) {
                    var cityName = parts[1];
                    var cityStats = stats.cityMap[key];
                    var speciesCount = cityStats.species.size;
                    var recordCount = cityStats.records;
                    barData.push({
                        name: cityName,
                        value: speciesCount,
                        records: recordCount
                    });
                    if (speciesCount > maxSpecies) maxSpecies = speciesCount;
                    if (recordCount > maxRecords) maxRecords = recordCount;
                }
            }
            
            // 按物种数降序排序
            barData.sort(function(a, b) {
                return b.value - a.value;
            });
            
            var cityNames = barData.map(function(item) { return item.name; });
            var speciesValues = barData.map(function(item) { return item.value; });
            var recordsValues = barData.map(function(item) { return item.records; });
            
            // 如果没有城市数据，显示提示信息
            if (barData.length === 0) {
                var noDataOption = {
                    title: {
                        text: provinceName + '暂无城市级数据',
                        subtext: '可能原因：\n1. 该省采集记录的地址信息不够详细\n2. 地址格式未包含城市名称\n\n建议：在录入时使用「地图选点」功能，系统会自动识别城市',

                            color: '#3D5A45',
                            fontSize: 16
                        },
                        subtextStyle: {
                            color: '#6B7470',
                            fontSize: 12
                        }
                    }
                };
                statsChart.setOption(noDataOption, true);
                document.getElementById('stats-back-btn').style.display = 'flex';
                return;
            }
            
            var option = {
                title: {
                    text: provinceName,
                    left: 'center',
                    top: 5,
                    textStyle: {
                        color: '#3D5A45',
                        fontSize: 13,
                        fontWeight: 500
                    }
                },
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        if (!params || !params.length) return '';
                        var cityName = params[0].name;
                        var cityData = barData.find(function(item) { return item.name === cityName; });
                        var tip = cityName + '<br/>';
                        tip += '物种数: ' + (cityData ? cityData.value : 0) + ' 种<br/>';
                        tip += '记录数: ' + (cityData ? cityData.records : 0) + ' 条';
                        return tip;
                    },
                    backgroundColor: 'rgba(61, 74, 63, 0.95)',
                    borderColor: '#3D5A45',
                    textStyle: {
                        color: '#fff',
                        fontSize: 12
                    }
                },
                legend: {
                    data: ['物种数', '记录数'],
                    right: 10,
                    top: 8,
                    textStyle: {
                        color: '#6B7470',
                        fontSize: 11
                    },
                    itemWidth: 12,
                    itemHeight: 8
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '8%',
                    top: '18%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: cityNames,
                    axisLabel: {
                        rotate: 0,
                        fontSize: 10,
                        color: '#6B7470',
                        margin: 6
                    },
                    axisLine: {
                        lineStyle: {
                            color: '#9CA4A0'
                        }
                    }
                },
                yAxis: {
                    type: 'value',
                    minInterval: 1,
                    nameTextStyle: {
                        color: '#6B7470',
                        fontSize: 10

                    axisLabel: {
                        color: '#6B7470',

                            color: '#E8EAE9',

                    {

                        barWidth: '35%',

                            color: '#5A7D66',

        async function backToCountry() {
            statsCurrentLevel = 'country';
            document.getElementById('stats-back-btn').style.display = 'none';
            
            // 恢复顶部卡片为全国数据
            var stats = await getStatsData();
            document.getElementById('stats-total-species').textContent = stats.totalSpecies;
            document.getElementById('stats-total-records').textContent = stats.totalRecords;
            
            // 重置图表配置，确保完全切换回地图模式
            if (statsChart) {
                statsChart.dispose();
                statsChart = null;
            }
            
            await initStatsChart();
            setTimeout(function() {
                if (statsChart) statsChart.resize();
            }, 100);
        }
        
        document.getElementById('stats-back-btn').addEventListener('click', backToCountry);

        window.addEventListener('resize', function() {
            if (statsChart) {
                setTimeout(function() {
                    statsChart.resize();
                }, 100);
            }
        });
        
        var originalSwitchPage = switchPage;
        switchPage = async function(pageName) {
            await originalSwitchPage(pageName);
            if (pageName === 'stats-page') {
                statsCurrentLevel = 'country';
                document.getElementById('stats-back-btn').style.display = 'none';
                
                var stats = await getStatsData();
                document.getElementById('stats-total-species').textContent = stats.totalSpecies;
                document.getElementById('stats-total-records').textContent = stats.totalRecords;
                
                setTimeout(function() {
                    initStatsChart();
                }, 100);
            }
        };
        
        // Initial: show add page
        (async function() {
            await originalSwitchPage('add-page');
        })();
    })();
