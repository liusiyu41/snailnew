<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蜗牛地图测试版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        
        .header {
            background: #3D5A45;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .content {
            padding: 20px;
            text-align: center;
        }
        
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            display: flex;
            border-top: 1px solid #ddd;
        }
        
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        
        .tab-item.active {
            color: #3D5A45;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>蜗牛地图测试版</h1>
    </div>
    
    <div class="content">
        <p>测试页面 - 如果能看到这个内容，说明基本功能正常</p>
        <p>当前时间: <span id="time"></span></p>
    </div>
    
    <div class="tab-bar">
        <div class="tab-item active">录入</div>
        <div class="tab-item">列表</div>
        <div class="tab-item">地图</div>
        <div class="tab-item">统计</div>
    </div>
    
    <script>
        // 更新时间
        function updateTime() {
            document.getElementById('time').textContent = new Date().toLocaleString();
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        console.log('测试版加载成功');
    </script>
</body>
</html>
